name: CI

# Chạy trên mọi push vào main, và mọi Pull Request nhắm vào main — đúng
# workflow đã dùng suốt dự án (branch riêng cho từng phase -> PR -> merge).
# Thêm check CI vào PR giúp phát hiện lỗi TRƯỚC khi merge, thay vì tự chạy
# lint/test bằng tay rồi quên (điều đã xảy ra vài lần ở các phase trước).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# DATABASE_URL/DIRECT_URL ở đây là URL GIẢ, không trỏ tới Neon thật.
# `prisma generate` chỉ cần đọc schema.prisma để sinh type — KHÔNG cần kết
# nối DB thật (chỉ `migrate`/`db push`/runtime query mới cần). Test cũng
# không chạm DB thật (mock toàn bộ). Build cũng vậy — API route là dynamic,
# không được prerender lúc build nên không gọi Prisma lúc build.
env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
  DIRECT_URL: "postgresql://user:password@localhost:5432/dummy"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      # Không bắt buộc (không có test nào chạm Prisma thật — xem mock trong
      # cartRepository.test.ts), nhưng vẫn chạy để test sát với production
      # nhất có thể và phát hiện sớm nếu schema.prisma có lỗi cú pháp.
      - run: npx prisma generate
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build ĐÚNG image sẽ deploy thật — job này tồn tại vì đã có lần
      # Dockerfile "tưởng đúng" (build không lỗi) nhưng container crash
      # ngay lúc chạy do thiếu file (server.ts không được copy vào runner
      # stage). `npm run build` ở job "build" phía trên KHÔNG bắt được lỗi
      # loại này — phải build + CHẠY THẬT container mới lộ ra.
      - run: docker build -t cart-redux-practice:ci .

      - name: Chạy container và đợi healthcheck
        run: |
          docker run -d --name smoke-test -p 3000:3000 \
            -e DATABASE_URL="postgresql://user:password@localhost:5432/dummy" \
            -e DIRECT_URL="postgresql://user:password@localhost:5432/dummy" \
            cart-redux-practice:ci
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Đợi container sẵn sàng... ($i/15)"
            sleep 2
          done
          echo "Container không healthy sau 30s — in log để debug:"
          docker logs smoke-test
          exit 1

      - name: Dọn container (luôn chạy, kể cả bước trên fail)
        if: always()
        run: docker rm -f smoke-test || true